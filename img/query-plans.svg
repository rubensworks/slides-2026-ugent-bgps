<svg width="600" height="220" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .node { fill: white; stroke: black; stroke-width: 1.5; }
    .line { stroke: black; stroke-width: 1.5; }
    .label { font-family: sans-serif; font-size: 10px; text-anchor: middle; }
  </style>

  <!-- PLAN 1: ((A ⋈ B) ⋈ C) -->
  <circle class="node" cx="100" cy="40" r="10"/>
  <circle class="node" cx="70" cy="90" r="10"/>
  <circle class="node" cx="40" cy="150" r="10"/>
  <circle class="node" cx="100" cy="150" r="10"/>
  <circle class="node" cx="140" cy="90" r="10"/>
  <line class="line" x1="100" y1="50" x2="70" y2="80"/>
  <line class="line" x1="100" y1="50" x2="140" y2="80"/>
  <line class="line" x1="70" y1="100" x2="40" y2="140"/>
  <line class="line" x1="70" y1="100" x2="100" y2="140"/>
  <text class="label" x="40" y="155">A</text>
  <text class="label" x="100" y="155">B</text>
  <text class="label" x="140" y="95">C</text>

  <!-- PLAN 2: (A ⋈ (B ⋈ C)) -->
  <circle class="node" cx="300" cy="40" r="10"/>
  <circle class="node" cx="330" cy="90" r="10"/>
  <circle class="node" cx="260" cy="90" r="10"/>
  <circle class="node" cx="300" cy="150" r="10"/>
  <circle class="node" cx="360" cy="150" r="10"/>
  <line class="line" x1="300" y1="50" x2="260" y2="80"/>
  <line class="line" x1="300" y1="50" x2="330" y2="80"/>
  <line class="line" x1="330" y1="100" x2="300" y2="140"/>
  <line class="line" x1="330" y1="100" x2="360" y2="140"/>
  <text class="label" x="260" y="95">A</text>
  <text class="label" x="300" y="155">B</text>
  <text class="label" x="360" y="155">C</text>

  <!-- PLAN 3: ((A ⋈ C) ⋈ B) -->
  <circle class="node" cx="500" cy="40" r="10"/>
  <circle class="node" cx="470" cy="90" r="10"/>
  <circle class="node" cx="440" cy="150" r="10"/>
  <circle class="node" cx="500" cy="150" r="10"/>
  <circle class="node" cx="540" cy="90" r="10"/>
  <line class="line" x1="500" y1="50" x2="470" y2="80"/>
  <line class="line" x1="500" y1="50" x2="540" y2="80"/>
  <line class="line" x1="470" y1="100" x2="440" y2="140"/>
  <line class="line" x1="470" y1="100" x2="500" y2="140"/>
  <text class="label" x="440" y="155">A</text>
  <text class="label" x="500" y="155">C</text>
  <text class="label" x="540" y="95">B</text>
</svg>
